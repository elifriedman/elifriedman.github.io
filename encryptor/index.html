<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Secure Encryptor</title>
<style>
  :root {
    color-scheme: light dark;
    --border: #8a8a8a;
    --bg-soft: rgba(127,127,127,0.08);
    --text: #111;
  }
  body {
    font-family: Arial, sans-serif;
    max-width: 760px;
    margin: 20px auto;
    padding: 12px;
  }
  h2 { text-align: center; }

  .card {
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    background: var(--bg-soft);
  }

  .dropzone {
    border: 2px dashed var(--border);
    padding: 28px;
    text-align: center;
    border-radius: 14px;
    margin-bottom: 10px;
  }

  .field {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 16px;
  }

  .password-wrapper {
    position: relative;
  }

  .toggle-eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
  }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  button {
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  .progress {
    height: 10px;
    background: #ddd;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 10px;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
  }

  .status {
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>
<body>

<h2>🔐 Secure Encryptor</h2>

<div class="card">
  <div id="dropzone" class="dropzone">Tap or drag a file here</div>
  <input type="file" id="fileInput" hidden />

  <div class="password-wrapper">
    <input id="password" class="field" type="password" placeholder="Enter password">
    <span id="toggleEye" class="toggle-eye">👁️</span>
  </div>

  <div class="buttons">
    <button id="encryptBtn">Encrypt</button>
    <button id="decryptBtn">Decrypt</button>
  </div>

  <div class="status" id="status"></div>
  <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/argon2-browser/dist/argon2.min.js"></script>
<script>
(() => {
  const MAGIC = new TextEncoder().encode('MYENCv04');
  const VERSION = 4;
  const encoder = new TextEncoder();
  const decoder = new TextDecoder();

  const DEFAULT_KDF = 'argon2id';
  const ARGON2_PARAMS = { time: 3, mem: 65536, parallelism: 1 };
  const PBKDF2_PARAMS = { iterations: 200000 };

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const passwordEl = document.getElementById('password');
  const toggleEye = document.getElementById('toggleEye');
  const encryptBtn = document.getElementById('encryptBtn');
  const decryptBtn = document.getElementById('decryptBtn');
  const statusEl = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');

  let file = null;

  toggleEye.onclick = () => {
    const hidden = passwordEl.type === 'password';
    passwordEl.type = hidden ? 'text' : 'password';
    toggleEye.textContent = hidden ? '🙈' : '👁️';
  };

  dropzone.onclick = () => fileInput.click();

  dropzone.ondrop = e => {
    e.preventDefault();
    file = e.dataTransfer.files[0];
    dropzone.innerText = file.name;
  };

  dropzone.ondragover = e => e.preventDefault();
  fileInput.onchange = () => {
    file = fileInput.files[0];
    dropzone.innerText = file.name;
  };

  function setProgress(p) {
    progressBar.style.width = p + '%';
  }

  function status(msg) {
    statusEl.innerText = msg;
  }

  function concat(...arrays) {
    let total = arrays.reduce((s,a)=>s+a.length,0);
    let out = new Uint8Array(total);
    let offset=0;
    for (let a of arrays) {
      out.set(a, offset);
      offset += a.length;
    }
    return out;
  }

  function u32be(n) {
    const b = new Uint8Array(4);
    new DataView(b.buffer).setUint32(0, n, false);
    return b;
  }

  function readU32be(bytes, offset) {
    return new DataView(bytes.buffer, bytes.byteOffset + offset, 4).getUint32(0, false);
  }

  async function deriveKey(password, salt) {
    if (DEFAULT_KDF === 'argon2id') {
      if (!window.argon2) throw new Error('Argon2 missing');

      const res = await argon2.hash({
        pass: password,
        salt,
        time: ARGON2_PARAMS.time,
        mem: ARGON2_PARAMS.mem,
        hashLen: 32,
        parallelism: ARGON2_PARAMS.parallelism,
        type: argon2.ArgonType.Argon2id
      });

      return crypto.subtle.importKey('raw', res.hash, { name: 'AES-GCM' }, false, ['encrypt','decrypt']);
    }

    const keyMaterial = await crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveKey']);

    return crypto.subtle.deriveKey({
      name: 'PBKDF2',
      salt,
      iterations: PBKDF2_PARAMS.iterations,
      hash: 'SHA-256'
    }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt','decrypt']);
  }

  async function encrypt() {
    if (!file) return alert('Select file');
    const password = passwordEl.value;
    if (!password) return alert('Enter password');

    const data = new Uint8Array(await file.arrayBuffer());
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const nonce = crypto.getRandomValues(new Uint8Array(12));

    const headerObj = {
      v: VERSION,
      kdf: DEFAULT_KDF,
      kdfParams: DEFAULT_KDF === 'argon2id' ? ARGON2_PARAMS : PBKDF2_PARAMS,
      salt: Array.from(salt),
      nonce: Array.from(nonce)
    };

    const headerBytes = encoder.encode(JSON.stringify(headerObj));
    const headerLen = u32be(headerBytes.length);
    const authData = concat(MAGIC, headerLen, headerBytes);

    const key = await deriveKey(password, salt);

    const encrypted = await crypto.subtle.encrypt(
      { name:'AES-GCM', iv: nonce, additionalData: authData },
      key,
      data
    );

    const output = concat(authData, new Uint8Array(encrypted));
    download(output, file.name + '.enc');
    status('Done ✅');
  }

  async function decrypt() {
    if (!file) return alert('Select file');
    const password = passwordEl.value;
    if (!password) return alert('Enter password');

    const data = new Uint8Array(await file.arrayBuffer());

    const magic = decoder.decode(data.slice(0,8));
    if (magic !== 'MYENCv04') return alert('Invalid file');

    const headerLen = readU32be(data, 8);
    const headerStart = 12;
    const headerEnd = headerStart + headerLen;

    const headerBytes = data.slice(headerStart, headerEnd);
    const header = JSON.parse(decoder.decode(headerBytes));

    const salt = new Uint8Array(header.salt);
    const nonce = new Uint8Array(header.nonce);

    const ciphertext = data.slice(headerEnd);

    const authData = concat(MAGIC, u32be(headerBytes.length), headerBytes);

    const key = await deriveKey(password, salt);

    try {
      const decrypted = await crypto.subtle.decrypt(
        { name:'AES-GCM', iv: nonce, additionalData: authData },
        key,
        ciphertext
      );

      download(new Uint8Array(decrypted), file.name.replace(/\.enc$/,''));
      status('Done ✅');
    } catch {
      alert('Wrong password or corrupted file');
    }
  }

  function download(data, filename) {
    const blob = new Blob([data]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }

  encryptBtn.onclick = encrypt;
  decryptBtn.onclick = decrypt;
})();
</script>

</body>
</html>
